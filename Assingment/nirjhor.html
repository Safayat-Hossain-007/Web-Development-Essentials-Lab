<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 1px solid black;
            padding: 2px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Registration Form</h1>
        <div>
        <h3>User personal Information</h3>
        <form action="#" method="post">
        <label for="fullname">Enter your full name</label> <br>
        <input type="text" id="fullname">
            <br>
        <label for="email">Enter your email</label> <br>
        <input type="email" id="email">
            <br>
        <label for="password"> Enter your password</label>
        <br>
        <input type="password" id="password">
        <br>
        
        <label for="C_password"> Confirm password</label>
        <br>
        <input type="password" id="C_password">
        <br><br>
    
        <p>Enter your gender</p>
        <input type="radio" id="Male" name="gender" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
    <br>
        <input type="radio" id="other" name="gender" value="others">
        <label for="others">Others</label>
        <br>
    
        <label for="address" id="area">Enter your Address</label>
        <br>
        <textarea name="address" id="area" cols="16" rows="4"></textarea>
        <br>
    
        <button>Sign-up</button>


        </div>

        

        
    </div>


  



    </form>
</body>
</html>
